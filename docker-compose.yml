services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: iot_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=default
      - RABBITMQ_DEFAULT_PASS=default

  redis:
    image: redis:7-alpine
    container_name: iot_redis
    ports:
      - "6379:6379"