services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: iot_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=default
      - RABBITMQ_DEFAULT_PASS=default
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: iot_redis
    ports:
      - "6379:6379"

  fastapi_app:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: iot_fastapi
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  alert_worker:
    build:
      context: .
      dockerfile: Dockerfile.workers
    container_name: iot_alert_server_send
    command: python alert_server_send.py
    depends_on:
      rabbitmq:
        condition: service_healthy